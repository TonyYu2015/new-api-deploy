name: ${COMPOSE_PROJECT_NAME:-new-api-deploy}

services:
  new-api:
    image: ${NEW_API_IMAGE:-calciumion/new-api:latest}
    container_name: ${APP_CONTAINER_NAME:-new-api}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SQL_DSN: "${MYSQL_USER:-new_api}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE:-new_api}?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_CONN_STRING: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      SESSION_SECRET: ${SESSION_SECRET}
      CRYPTO_SECRET: ${CRYPTO_SECRET}
    volumes:
      - ${NEW_API_DATA_DIR:-./data/new-api}:/data
    networks:
      - new-api-net

  nginx:
    image: ${CADDY_IMAGE:-caddy:2.8-alpine}
    container_name: ${CADDY_CONTAINER_NAME:-new-api-nginx}
    restart: unless-stopped
    depends_on:
      - html-filter
    ports:
      - "${HTTP_PORT:-3001}:80"
      - "${HTTPS_PORT:-3443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - new-api-net

  html-filter:
    image: ${NGINX_IMAGE:-nginx:1.27-alpine}
    container_name: ${HTML_FILTER_CONTAINER_NAME:-new-api-html-filter}
    restart: unless-stopped
    depends_on:
      - new-api
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - new-api-net

  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    container_name: ${MYSQL_CONTAINER_NAME:-new-api-mysql}
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-new_api}
      MYSQL_USER: ${MYSQL_USER:-new_api}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"
    volumes:
      - ${MYSQL_DATA_DIR:-./data/mysql}:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - new-api-net

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-new-api-redis}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ${REDIS_DATA_DIR:-./data/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - new-api-net

networks:
  new-api-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
