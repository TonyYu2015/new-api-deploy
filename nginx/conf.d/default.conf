server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location /stripe/ {
        proxy_pass http://stripe-topup:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://new-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter '</body>' '<a href="/stripe/" style="position:fixed;right:22px;bottom:22px;z-index:2147483647;display:inline-flex;align-items:center;justify-content:center;height:44px;padding:0 18px;border-radius:8px;background:#111827;color:#fff;font:600 15px/1 system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;text-decoration:none;box-shadow:0 10px 24px rgba(15,23,42,.22)">充值</a></body>';
    }
}
