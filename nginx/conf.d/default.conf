server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    location / {
        proxy_pass http://new-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        sub_filter_once off;
        sub_filter '<html lang="zh">' '<html lang="en">';
        sub_filter '<title>New API</title>' '<title>CCAI Service</title>';
        sub_filter 'content="统一的 AI 模型聚合与分发网关，支持将各类大语言模型跨格式转换为 OpenAI、Claude、Gemini 兼容接口，为个人与企业提供集中式模型管理与网关服务。"' 'content="CCAI Service AI model gateway."';
    }
}
